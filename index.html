<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Previewer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            body: ['DM Sans', 'sans-serif'],
            mono: ['Space Mono', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(20px) scale(0.95); } }
    .fade-up { animation: fadeUp 0.4s ease-out both; }
    .skeleton-line {
      background: linear-gradient(90deg, transparent 0%, rgba(128,128,128,0.15) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .toast-enter { animation: toastIn 0.3s ease-out both; }
    .toast-exit { animation: toastOut 0.25s ease-in both; }
    html, body { height: 100%; }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-stone-50 dark:bg-stone-950 font-body text-stone-800 dark:text-stone-200 transition-colors duration-300 pb-24 sm:pb-0">
  <div id="app-wrapper" class="h-full w-full overflow-auto"><!-- Header -->
   <header class="sticky top-0 z-30 backdrop-blur-xl bg-stone-50/80 dark:bg-stone-950/80 border-b border-stone-200/60 dark:border-stone-800/60">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
     <h1 id="app-title" class="text-lg font-bold tracking-tight text-stone-900 dark:text-stone-100 flex items-center gap-2"><span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-amber-500 text-white text-sm font-bold">S</span> Search Previewer</h1><button id="theme-toggle" class="p-2 rounded-xl hover:bg-stone-200 dark:hover:bg-stone-800 transition-colors" aria-label="Toggle theme"> <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i> <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i> </button>
    </div>
   </header><!-- Main -->
   <main class="max-w-3xl mx-auto px-4 py-6 sm:py-8 space-y-5 sm:space-y-6"><!-- Search Input -->
    <div class="relative sticky top-14 sm:top-16 z-20 sm:z-auto
      bg-stone-50/90 dark:bg-stone-950/90 backdrop-blur-md shadow-sm
      transition-all duration-200
      py-2 -mx-4 px-4 sm:static sm:bg-transparent sm:backdrop-blur-none sm:shadow-none">
     <div class="relative"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-stone-400 pointer-events-none"></i> <input id="search-input" type="text" autofocus class="w-full pl-12 pr-4 py-4 text-lg rounded-2xl border-2 border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-900 focus:border-amber-500 dark:focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all placeholder:text-stone-400" placeholder="Search anything...">
     </div>
     <div class="mt-2 text-center">
     </div>
    </div>
    <!-- URL Preview -->
    <div id="url-preview"
      class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl bg-stone-100 dark:bg-stone-900 border border-stone-200 dark:border-stone-800 font-mono text-sm text-stone-500 dark:text-stone-400 transition-all opacity-50">

      <span id="url-text" class="truncate">
        https://www.google.com/search?q=...
      </span>

      <button id="url-copy-btn"
        class="p-3 sm:p-2 rounded-md hover:bg-stone-200 dark:hover:bg-stone-800 transition-colors"
        title="Copy URL">
        <i data-lucide="copy" class="w-4 h-4"></i>
      </button>
    </div>
    <!-- Action Buttons -->
    <div class="flex flex-wrap gap-3"><button id="btn-search" disabled class="flex-1 min-w-[140px] flex items-center justify-center gap-2 px-6 py-4 text-base sm:px-5 sm:py-3 sm:text-sm rounded-xl bg-amber-500 text-white font-semibold hover:bg-amber-600 disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-[0.97]"> <i data-lucide="external-link" class="w-4 h-4"></i> Search on Google </button> <button id="btn-copy" disabled class="flex-1 min-w-[120px] flex items-center justify-center gap-2 px-6 py-4 text-base sm:px-5 sm:py-3 sm:text-sm rounded-xl bg-stone-200 dark:bg-stone-800 font-semibold hover:bg-stone-300 dark:hover:bg-stone-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-[0.97]"> <i data-lucide="copy" class="w-4 h-4"></i> Copy Link </button> <button id="btn-clear" disabled class="flex items-center justify-center gap-2 px-6 py-4 text-base sm:px-5 sm:py-3 sm:text-sm rounded-xl bg-stone-200 dark:bg-stone-800 font-semibold hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-900/30 dark:hover:text-red-400 disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-[0.97]"> <i data-lucide="x" class="w-4 h-4"></i> Clear </button>
    </div><!-- Live Preview -->
    <section id="preview-section" class="space-y-4 sm:space-y-3">
     <h2 class="text-sm font-semibold text-stone-400 uppercase tracking-wider flex items-center gap-2"><i data-lucide="eye" class="w-4 h-4"></i> Live Preview</h2>
      <div id="intent-badge"
        class="hidden inline-block text-xs font-medium px-3 py-1 rounded-full bg-stone-200 dark:bg-stone-800 text-stone-700 dark:text-stone-300">
        Intent: General
      </div>
     <div id="preview-container" class="space-y-4">
      <div id="skeleton" class="hidden space-y-4">
       <div class="p-5 rounded-2xl bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 space-y-3">
        <div class="h-4 w-3/4 rounded skeleton-line bg-stone-200 dark:bg-stone-800"></div>
        <div class="h-3 w-1/3 rounded skeleton-line bg-stone-200 dark:bg-stone-800"></div>
        <div class="h-3 w-full rounded skeleton-line bg-stone-200 dark:bg-stone-800"></div>
        <div class="h-3 w-5/6 rounded skeleton-line bg-stone-200 dark:bg-stone-800"></div>
       </div>
      </div>
      <div id="results-cards" class="space-y-3"></div>
     </div>
    </section>
   </main>
    <footer class="text-center text-xs sm:text-sm text-stone-400 py-6">
      Built with ❤️ by ~ Shankar Praasad Pyke
    </footer>
   <!-- Toast Container -->
   <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2"></div>
  </div>
  <script>
    // State
    let debounceTimer = null;
    let currentQuery = '';

    // Elements
    const input = document.getElementById('search-input');
    const urlPreview = document.getElementById('url-preview');
    const urlText = document.getElementById('url-text');
    const urlCopyBtn = document.getElementById('url-copy-btn');
    const btnSearch = document.getElementById('btn-search');
    const btnCopy = document.getElementById('btn-copy');
    const btnClear = document.getElementById('btn-clear');
    const skeleton = document.getElementById('skeleton');
    const resultsCards = document.getElementById('results-cards');
    const themeToggle = document.getElementById('theme-toggle');
    const toastContainer = document.getElementById('toast-container');

    // Fake result templates
    function detectIntent(query) {
      const q = query.toLowerCase();

      if (q.includes("buy") || q.includes("price")) {
        return {
          label: "🛒 Shopping",
          color: "bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400"
        };
      }

      if (q.includes("how") || q.includes("what") || q.includes("guide")) {
        return {
          label: "📘 Informational",
          color: "bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400"
        };
      }

      if (q.includes("video") || q.includes("watch")) {
        return {
          label: "🎥 Video",
          color: "bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400"
        };
      }

      return {
        label: "🔍 General",
        color: "bg-stone-200 text-stone-700 dark:bg-stone-800 dark:text-stone-300"
      };
    }

    function getResultsByIntent(q, intent) {
      const slug = q.toLowerCase().replace(/\s+/g, '-');

      if (intent.includes("Shopping")) {
        return [
          { title: `${q} - Amazon`, url: `www.amazon.in/s?k=${slug}`, desc: `Buy ${q} online.` },
          { title: `${q} - Flipkart`, url: `www.flipkart.com/search?q=${slug}`, desc: `Check price and offers for ${q}.` },
          { title: `${q} - Myntra`, url: `www.myntra.com/${slug}`, desc: `Explore ${q} on Myntra.` },
          { title: `${q} - Meesho`, url: `www.meesho.com/search?q=${slug}`, desc: `Affordable ${q} options.` },
          { title: `${q} - Snapdeal`, url: `www.snapdeal.com/search?keyword=${slug}`, desc: `Deals on ${q}.` }
        ];
      }

      if (intent.includes("Video")) {
        return [
          { title: `${q} - YouTube`, url: `www.youtube.com/results?search_query=${slug}`, desc: `Watch videos about ${q}.` },
          { title: `${q} - Dailymotion`, url: `www.dailymotion.com/search/${slug}`, desc: `More videos on ${q}.` },
          { title: `${q} - Vimeo`, url: `vimeo.com/search?q=${slug}`, desc: `Creative videos about ${q}.` },
          { title: `${q} - Facebook Watch`, url: `www.facebook.com/watch/search/?q=${slug}`, desc: `Trending videos.` },
          { title: `${q} - Instagram`, url: `www.instagram.com/explore/tags/${slug}`, desc: `Short videos and reels.` }
        ];
      }

      // Informational / General
      return [
        { title: `${q} - Wikipedia`, url: `en.wikipedia.org/wiki/${slug}`, desc: `Learn about ${q}.` },
        { title: `${q} - Google News`, url: `news.google.com/search?q=${slug}`, desc: `Latest updates on ${q}.` },
        { title: `${q} - Medium`, url: `medium.com/search?q=${slug}`, desc: `Articles about ${q}.` },
        { title: `${q} - Quora`, url: `www.quora.com/search?q=${slug}`, desc: `People discussing ${q}.` },
        { title: `${q} - Reddit`, url: `www.reddit.com/search/?q=${slug}`, desc: `Community discussions on ${q}.` }
      ];
    }

    function buildUrl(q) {
      return `https://www.google.com/search?q=${encodeURIComponent(q)}`;
    }

    function highlight(text, query) {
      if (!query) return text;
      const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark class="bg-amber-200 dark:bg-amber-700/50 text-inherit rounded px-0.5">$1</mark>');
    }

function renderResults(q) {
  if (!q.trim()) { resultsCards.innerHTML = ''; return; }

  const intent = detectIntent(q).label;
  const results = getResultsByIntent(q, intent);
  results.sort(() => Math.random() - 0.5);

  resultsCards.innerHTML = results.map((r, i) => {
    const title = highlight(r.title, q);
    const url = r.url;
    const desc = highlight(r.desc, q);
    const siteUrl = `https://${url}`;

    return `<div 
      class="fade-up p-5 rounded-2xl bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 
      hover:shadow-xl hover:scale-[1.02] transition-all duration-200 cursor-pointer active:scale-[0.98]" 
      style="animation-delay:${i * 80}ms"
      onclick="window.open('${siteUrl}', '_blank')"
    >
      <div class="text-lg font-semibold text-blue-600 dark:text-blue-400 leading-snug hover:underline">${title}</div>
      <div class="text-sm text-emerald-700 dark:text-emerald-500 font-mono mt-1">${url}</div>
      <p class="text-sm text-stone-600 dark:text-stone-400 mt-2 leading-relaxed line-clamp-2">${desc}</p>
    </div>`;
  }).join('');
}

    function updateUI(q) {
      currentQuery = q;
      const hasQuery = q.trim().length > 0;
      const intentBadge = document.getElementById('intent-badge');

      if (hasQuery) {
        const intent = detectIntent(q);

        intentBadge.textContent = `Intent: ${intent.label}`;
        intentBadge.className = `inline-block text-xs font-medium px-3 py-1 rounded-full ${intent.color}`;
        intentBadge.classList.remove('hidden');
      } else {
        intentBadge.classList.add('hidden');
      }
      btnSearch.disabled = !hasQuery;
      btnCopy.disabled = !hasQuery;
      btnClear.disabled = !hasQuery;
      if (hasQuery) {
        const fullUrl = buildUrl(q);
        const encodedQ = encodeURIComponent(q);

        urlText.innerHTML = fullUrl.replace(
          encodedQ,
          `<mark class="bg-amber-200 dark:bg-amber-700/50 px-1 rounded">${encodedQ}</mark>`
        );
      } else {
        urlText.textContent = 'https://www.google.com/search?q=...';
      }
      urlPreview.classList.toggle('opacity-50', !hasQuery);
      urlPreview.classList.toggle('opacity-100', hasQuery);
      skeleton.classList.add('hidden');
      renderResults(q);
    }

    // Debounced input
    input.addEventListener('input', () => {
      const q = input.value;
      if (q.trim()) {
        skeleton.classList.remove('hidden');
        resultsCards.innerHTML = '';
      }
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => updateUI(q), 300);
    });

    // Actions
    function doSearch() {
      const q = input.value.trim();
      if (!q) return;
      showToast('Redirecting...');
      setTimeout(() => window.open(buildUrl(q), '_blank'), 400);
    }
    btnSearch.addEventListener('click', doSearch);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    btnCopy.addEventListener('click', () => {
      const q = input.value.trim();
      if (!q) return;
      navigator.clipboard.writeText(buildUrl(q)).then(() => showToast('Link copied!'));
    });

    urlCopyBtn.addEventListener('click', () => {
      const q = input.value.trim();
      if (!q) return;

      navigator.clipboard.writeText(buildUrl(q))
        .then(() => showToast('Link copied!'));
    });

    btnClear.addEventListener('click', () => {
      input.value = '';
      updateUI('');
      input.focus();
      showToast('Cleared');
    });

    // Ctrl+K
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); input.focus(); }
    });

    // Toast
    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-enter px-4 py-2.5 rounded-xl bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 text-sm font-medium shadow-lg';
      t.textContent = msg;
      toastContainer.appendChild(t);
      setTimeout(() => { t.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => t.remove(), 300); }, 2000);
    }

    // Dark mode
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      localStorage.setItem('sp_theme', dark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => {
      applyTheme(!document.documentElement.classList.contains('dark'));
      lucide.createIcons();
    });
    applyTheme(localStorage.getItem('sp_theme') === 'dark' || (!localStorage.getItem('sp_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches));

    // Element SDK
    const defaultConfig = {
      app_title: 'Search Previewer',
      search_placeholder: 'Search anything...',
      background_color: '#fafaf9',
      surface_color: '#ffffff',
      text_color: '#1c1917',
      primary_action_color: '#f59e0b',
      secondary_action_color: '#e7e5e4',
      font_family: 'DM Sans',
      font_size: 16
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      const title = document.getElementById('app-title');
      title.lastChild.textContent = ' ' + c.app_title;
      input.placeholder = c.search_placeholder;

      const r = document.documentElement.style;
      // Colors applied via CSS vars for easy dark mode handling
      document.getElementById('app-wrapper').style.backgroundColor = document.documentElement.classList.contains('dark') ? '' : c.background_color;

      const font = c.font_family + ', DM Sans, sans-serif';
      document.body.style.fontFamily = font;

      const base = c.font_size || 16;
      document.body.style.fontSize = base + 'px';
      title.style.fontSize = (base * 1.15) + 'px';
    }

    lucide.createIcons();
  </script>
</html>
